<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Opening Range Trainer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♠️</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Poker Opening Range Trainer</h1>
    <p class="subtitle">6-Max GTO Preflop Ranges</p>
  </header>

  <main>
    <!-- Controls -->
    <section id="controls">
      <div class="control-group">
        <label for="mode-select">Mode:</label>
        <select id="mode-select">
          <option value="live">Live Table</option>
          <option value="quiz">Quiz — RFI</option>
          <option value="explore">Explore RFI</option>
          <option value="explore-vs">Explore vs Raise</option>
        </select>
      </div>
      <div class="control-group" id="position-group">
        <label for="position-select">Your Position:</label>
        <select id="position-select">
          <option value="random">Random</option>
        </select>
      </div>
      <div class="control-group hidden" id="opener-group">
        <label for="opener-select">Opener:</label>
        <select id="opener-select"></select>
      </div>
      <button id="deal-btn" class="btn btn-primary">Deal Hand</button>
    </section>

    <!-- Poker Table Visualization -->
    <section id="table-area">
      <div id="poker-table">
        <div class="felt">
          <div class="felt-label">6-Max</div>
        </div>
        <!-- Seats rendered by JS -->
      </div>
    </section>

    <!-- Situation prompt (for live table) -->
    <div id="situation-prompt" class="hidden"></div>

    <!-- Hand display (shared by all quiz modes) -->
    <section id="hand-area" class="hidden">
      <div id="hand-display">
        <div class="card" id="card-1"></div>
        <div class="card" id="card-2"></div>
      </div>
    </section>

    <!-- Dynamic action buttons (context-dependent) -->
    <section id="action-area" class="hidden">
      <div id="action-buttons"></div>
    </section>

    <!-- Feedback -->
    <div id="feedback" class="hidden">
      <span id="feedback-icon"></span>
      <span id="feedback-text"></span>
    </div>

    <!-- Reveal grid (shown on wrong answers or seat clicks) -->
    <section id="reveal-area" class="hidden">
      <div id="reveal-header"></div>
      <div id="reveal-grid"></div>
      <div id="reveal-legend"></div>
    </section>

    <!-- Next Hand button (always accessible after answering) -->
    <div id="next-hand-area" class="hidden" style="text-align:center; margin-bottom:1rem;">
      <button id="next-hand-btn" class="btn btn-primary">Next Hand</button>
    </div>

    <!-- Explore RFI Grid -->
    <section id="explore-area" class="hidden">
      <div id="range-grid"></div>
      <div id="legend">
        <span class="legend-item"><span class="swatch raise"></span> Raise</span>
        <span class="legend-item"><span class="swatch fold"></span> Fold</span>
      </div>
    </section>

    <!-- Explore vs Raise Grid -->
    <section id="explore-vs-area" class="hidden">
      <div id="explore-vs-prompt" class="explore-prompt">Click a seat to set it as the opener, then see your range.</div>
      <div id="explore-vs-header" class="reveal-hdr"></div>
      <div id="range-grid-vs"></div>
      <div id="legend-vs"></div>
    </section>

    <!-- Scoreboard -->
    <section id="scoreboard">
      <div class="score-item">
        <span class="score-label">Correct</span>
        <span id="correct-count" class="score-value correct">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Wrong</span>
        <span id="wrong-count" class="score-value wrong">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Accuracy</span>
        <span id="accuracy" class="score-value">&mdash;</span>
      </div>
      <button id="reset-btn" class="btn btn-secondary">Reset Score</button>
    </section>
  </main>

  <footer>
    <p>Practice GTO preflop ranges &mdash; 6-max cash &mdash; Keys: <kbd>R</kbd>aise/<kbd>3</kbd>-bet/<kbd>4</kbd>-bet, <kbd>C</kbd>all, <kbd>F</kbd>old, <kbd>N</kbd>ext/<kbd>Space</kbd></p>
  </footer>

  <script src="ranges.js"></script>
  <script src="app.js"></script>
</body>
</html>
